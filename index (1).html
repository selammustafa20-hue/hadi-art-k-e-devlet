// ── RENDER ───────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const navSrc = (screen === 'profile' || screen === 'identity') ? I.nav_prof : I.nav_home;

  app.innerHTML = `
    <div style="flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch" id="content">
      ${screen === 'home' ? renderHome() : ''}
      ${screen === 'profile' ? renderProfile() : ''}
      ${screen === 'identity' ? renderIdentity() : ''}
    </div>
    <img src="${navSrc}" id="nav" style="width:100%;display:block;flex-shrink:0;cursor:pointer"/>
    <div style="height:env(safe-area-inset-bottom,20px);background:#16171a;flex-shrink:0"></div>
    ${showAdmin ? renderAdmin() : ''}
  `;

  // Nav click
  document.getElementById('nav').addEventListener('click', e => {
    const pct = e.offsetX / e.target.offsetWidth;
    if (pct < 0.25) goTo('home');
    else if (pct > 0.75) goTo('profile');
  });

  // Logo tap (triple tap = admin)
  const logo = document.getElementById('logo');
  if (logo) {
    logo.addEventListener('click', () => {
      adminTaps++;
      if (adminTimer) clearTimeout(adminTimer);
      adminTimer = setTimeout(() => { adminTaps = 0; }, 1200);
      if (adminTaps >= 3) {
        adminTaps = 0;
        showAdmin = true;
        render();
      }
    });
  }

  // Back button
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', () => goTo('profile'));

  // Kimlik card click
  const kimlikCard = document.getElementById('kimlikCard');
  if (kimlikCard) kimlikCard.addEventListener('click', () => goTo('identity'));

  // Admin panel
  if (showAdmin) bindAdmin();
}

function goTo(s) {
  screen = s;
  render();
  document.getElementById('content').scrollTop = 0;
}

// ── HOME ─────────────────────────────────────────────────────
function renderHome() {
  return `
    <img src="${I.logo}" id="logo" style="width:100%;display:block;cursor:pointer"/>
    <img src="${I.home_content}" style="width:100%;display:block"/>
  `;
}

// ── PROFILE ──────────────────────────────────────────────────
function renderProfile() {
  return `
    <img src="${I.prof_header}" style="width:100%;display:block"/>
    <div style="position:relative">
      <img src="${I.prof_content}" style="width:100%;display:block"/>
      <div id="kimlikCard" style="position:absolute;top:40.4%;left:2%;width:47%;height:21.5%;cursor:pointer"></div>
    </div>
  `;
}

    </div>
  `;
}

// ── ADMIN ────────────────────────────────────────────────────
function renderAdmin() {
  const fields = [
    {key:'name',label:'İsim Soyisim'},
    {key:'phone',label:'Telefon No'},
    {key:'email',label:'E-Posta'},
    {key:'babaAdi',label:'Baba Adı'},
    {key:'anneAdi',label:'Anne Adı'},
    {key:'dogumYeri',label:'Doğum Yeri'},
    {key:'dogumTarihi',label:'Doğum Tarihi'},
    {key:'adres',label:'Adres'},
  ];
  const fieldsHtml = fields.map(f => `
    <div style="margin-bottom:13px">
      <div style="color:#8e9099;font-size:10.5px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px">${f.label}</div>
      <input id="admin_${f.key}" value="${data[f.key]}" style="width:100%;background:#1e2128;border:1px solid #3a3d44;border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;box-sizing:border-box;outline:none;font-family:inherit"/>
    </div>
  `).join('');
  return `
    <div id="adminPanel" style="position:absolute;inset:0;z-index:9999;background:rgba(0,0,0,0.93);backdrop-filter:blur(14px);display:flex;flex-direction:column">
      <div style="margin:16px;background:#282b32;border-radius:18px;padding:18px 16px;flex:1;overflow-y:auto;border:1px solid #3a3d44">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
          <span style="color:#fff;font-weight:700;font-size:17px">⚙️ Gizli Panel</span>
          <button id="adminClose" style="background:#3a3d44;border:none;border-radius:20px;color:#fff;padding:6px 14px;cursor:pointer;font-size:13px">✕ Kapat</button>
        </div>
        ${fieldsHtml}
        <button id="adminSave" style="width:100%;background:#2f82d4;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;padding:14px 0;cursor:pointer;margin-top:8px">💾 Kaydet & Uygula</button>
      </div>
    </div>
  `;
}

function bindAdmin() {
  document.getElementById('adminClose').addEventListener('click', () => {
    showAdmin = false;
    render();
  });
  document.getElementById('adminSave').addEventListener('click', () => {
    const fields = ['name','phone','email','babaAdi','anneAdi','dogumYeri','dogumTarihi','adres'];
    fields.forEach(k => {
      const el = document.getElementById('admin_' + k);
      if (el) data[k] = el.value;
    });
    showAdmin = false;
    render();
  });
}

// ── INIT ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
